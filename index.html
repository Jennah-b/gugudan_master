<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>구구단 마스터 ✨</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#302b63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="구구단">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { 
    width: 100%; min-height: 100vh; overflow-x: hidden;
    font-family: 'Noto Sans KR', sans-serif; color: #fff;
    background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .jua { font-family: 'Jua', sans-serif; }
  .app { padding: 20px 16px; min-height: 100vh; max-width: 480px; margin: 0 auto; }
  .hidden { display: none !important; }

  /* ── Back button ── */
  .back-btn { cursor: pointer; font-size: 14px; opacity: 0.7; margin-bottom: 16px; padding: 4px 0; }
  .back-btn:hover { opacity: 1; }

  /* ── Title ── */
  .screen-title { text-align: center; margin-bottom: 8px; }
  .screen-title h2 { font-size: 26px; }

  /* ── Toggle buttons (random / order) ── */
  .toggle-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
  .toggle-btn {
    padding: 6px 18px; border-radius: 20px; font-size: 13px; cursor: pointer;
    background: rgba(255,255,255,0.05); border: 1px solid transparent;
    color: #fff; transition: all 0.2s;
  }
  .toggle-btn.active {
    background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); font-weight: 700;
  }

  /* ── Flashcard ── */
  .card-container { perspective: 800px; cursor: pointer; width: 100%; max-width: 320px; height: 200px; margin: 0 auto; }
  .card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    border-radius: 20px; display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  .card-front {
    background: linear-gradient(135deg, #667eea, #764ba2);
    box-shadow: 0 10px 40px rgba(102,126,234,0.4);
  }
  .card-back {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    box-shadow: 0 10px 40px rgba(245,87,108,0.4);
    transform: rotateY(180deg);
  }
  .card-front .q { font-size: 42px; font-weight: 800; }
  .card-front .hint { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 12px; }
  .card-back .sub { font-size: 22px; color: rgba(255,255,255,0.8); }
  .card-back .ans { font-size: 56px; font-weight: 800; }

  /* ── Nav buttons ── */
  .nav-row { display: flex; justify-content: center; gap: 16px; margin-top: 28px; }
  .nav-btn {
    padding: 12px 28px; border-radius: 14px; font-size: 15px; cursor: pointer;
    font-weight: 700; color: #fff; transition: all 0.15s; border: none;
  }
  .nav-btn.prev { background: rgba(255,255,255,0.15); }
  .nav-btn.next { background: linear-gradient(135deg,#667eea,#764ba2); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Home mode cards ── */
  .mode-card {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px;
    border-radius: 16px; margin-bottom: 10px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: slideIn 0.4s ease both;
  }
  .mode-card:active { transform: scale(0.97); }
  .mode-card.disabled { opacity: 0.4; cursor: not-allowed; }
  .mode-card .icon { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .mode-card .title { font-weight: 700; font-size: 16px; }
  .mode-card .desc { font-size: 12px; opacity: 0.6; }

  /* ── Dan select grid ── */
  .dan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 360px; margin: 0 auto; }
  .dan-cell {
    border-radius: 16px; padding: 24px 12px; text-align: center; cursor: pointer;
    transition: transform 0.15s;
  }
  .dan-cell:active { transform: scale(0.95); }
  .dan-cell .num { font-size: 36px; font-weight: 800; }
  .dan-cell .range { font-size: 12px; opacity: 0.6; margin-top: 4px; }

  /* ── Level badge (home) ── */
  .level-badge {
    background: rgba(255,255,255,0.08); border-radius: 20px; padding: 16px 20px;
    margin-bottom: 24px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
  }
  .level-badge .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .level-badge .emoji { font-size: 36px; }
  .level-badge .name { font-weight: 900; font-size: 18px; }
  .level-badge .pts { font-size: 13px; opacity: 0.7; }
  .progress-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.15); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.7; margin-bottom: 4px; }

  /* ── Quiz mode ── */
  .timer-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); margin-bottom: 16px; overflow: hidden; }
  .timer-fill { height: 100%; border-radius: 3px; transition: width 1s linear, background 0.3s; }
  .timer-num { text-align: center; font-size: 36px; font-weight: 900; margin-bottom: 12px; transition: color 0.3s; }
  .quiz-card-front {
    background: linear-gradient(135deg, #4ECDC4, #44A08D);
    box-shadow: 0 10px 40px rgba(78,205,196,0.3);
  }
  .quiz-card-back {
    background: linear-gradient(135deg, #f5af19, #f12711);
    box-shadow: 0 10px 40px rgba(241,39,17,0.3);
  }
  .ox-row { display: flex; justify-content: center; gap: 16px; margin-top: 24px; }
  .ox-btn {
    padding: 14px 32px; border-radius: 16px; cursor: pointer; font-weight: 700;
    font-size: 18px; color: #fff; border: none; transition: transform 0.1s;
  }
  .ox-btn:active { transform: scale(0.95); }
  .ox-btn.o { background: linear-gradient(135deg,#4ECDC4,#44A08D); }
  .ox-btn.x { background: linear-gradient(135deg,#FF6B6B,#ee5a24); }
  .flip-btn {
    margin: 24px auto 0; padding: 14px 36px; border-radius: 16px; cursor: pointer;
    background: linear-gradient(135deg,#667eea,#764ba2); font-weight: 700; font-size: 15px;
    text-align: center; max-width: 200px; color: #fff; border: none;
  }
  .streak-banner {
    text-align: center; font-size: 18px; color: #FFE66D; margin-bottom: 8px;
    animation: bounceIn 0.4s ease;
  }
  .info-bar { display: flex; justify-content: space-between; font-size: 13px; opacity: 0.7; margin-bottom: 8px; padding: 0 4px; }

  /* ── Speed mode ── */
  .speed-card {
    width: 100%; max-width: 320px; margin: 0 auto; padding: 40px 20px;
    border-radius: 20px; text-align: center; transition: background 0.3s;
    box-shadow: 0 10px 40px rgba(255,107,107,0.3);
  }
  .speed-card.neutral { background: linear-gradient(135deg,#FF6B6B,#FF8E53); }
  .speed-card.correct { background: linear-gradient(135deg,#4ECDC4,#44A08D); }
  .speed-card.wrong { background: linear-gradient(135deg,#FF6B6B,#ee5a24); }
  .speed-input {
    width: 80%; max-width: 180px; padding: 12px 16px; border-radius: 14px;
    border: none; font-size: 24px; font-weight: 700; text-align: center;
    outline: none; background: rgba(255,255,255,0.95); color: #333;
  }
  .speed-input::placeholder { color: #aaa; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .speed-submit {
    margin: 16px auto 0; padding: 10px 28px; border-radius: 12px;
    background: rgba(255,255,255,0.25); cursor: pointer; font-weight: 700;
    font-size: 15px; display: inline-block; color: #fff; border: none;
  }

  /* ── Result screen ── */
  .result-center {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 20px 16px;
  }
  .result-box {
    background: rgba(255,255,255,0.08); border-radius: 20px; padding: 24px;
    text-align: center; width: 100%; max-width: 300px;
  }
  .result-box .line { font-size: 16px; margin-bottom: 8px; }
  .result-box .earned { font-size: 20px; font-weight: 800; margin-top: 12px; color: #FFE66D; }
  .home-btn {
    margin-top: 28px; padding: 14px 36px; border-radius: 16px; cursor: pointer;
    background: linear-gradient(135deg,#667eea,#764ba2); font-weight: 700;
    font-size: 16px; color: #fff; border: none;
  }

  /* ── Wrong mode ── */
  .wrong-nav { display: flex; justify-content: center; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .wrong-btn {
    padding: 10px 22px; border-radius: 12px; cursor: pointer; font-weight: 700;
    font-size: 14px; color: #fff; border: none;
  }
  .wrong-btn.side { background: rgba(255,255,255,0.1); }
  .wrong-btn.got-it { background: linear-gradient(135deg,#4ECDC4,#44A08D); }

  /* ── Level map ── */
  .level-node {
    display: flex; align-items: center; gap: 16px; margin-bottom: 4px; position: relative;
  }
  .level-connector {
    position: absolute; left: 27px; top: 56px; width: 3px; height: 28px; border-radius: 2px;
  }
  .level-circle {
    width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 28px; flex-shrink: 0; transition: all 0.3s;
  }
  .level-info .lname { font-weight: 700; font-size: 15px; }
  .level-info .lpts { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .current-tag {
    margin-left: 8px; font-size: 11px; color: #fff; padding: 2px 8px;
    border-radius: 8px; vertical-align: middle; display: inline-block;
  }

  /* ── Start screen (speed) ── */
  .start-center {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 20px 16px;
  }
  .start-btn {
    padding: 16px 48px; border-radius: 20px; cursor: pointer;
    background: linear-gradient(135deg,#FF6B6B,#ee5a24); font-weight: 800;
    font-size: 20px; box-shadow: 0 8px 32px rgba(255,107,107,0.4);
    color: #fff; border: none;
  }

  .reset-btn { text-align: center; margin-top: 20px; font-size: 12px; opacity: 0.4; cursor: pointer; padding: 8px; }

  /* ── Animations ── */
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }

  /* ── Confetti canvas ── */
  #confetti-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas" class="hidden"></canvas>

<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA & CONFIG
// ═══════════════════════════════════════════════════════
const LEVELS = [
  { level:1, name:"구구단 새싹", emoji:"🌱", pts:0, color:"#8BC34A" },
  { level:2, name:"구구단 꽃봉오리", emoji:"🌷", pts:30, color:"#E91E63" },
  { level:3, name:"구구단 별", emoji:"⭐", pts:80, color:"#FFC107" },
  { level:4, name:"구구단 왕관", emoji:"👑", pts:150, color:"#FF9800" },
  { level:5, name:"구구단 로켓", emoji:"🚀", pts:250, color:"#2196F3" },
  { level:6, name:"구구단 마법사", emoji:"🧙", pts:400, color:"#9C27B0" },
  { level:7, name:"구구단 용사", emoji:"⚔️", pts:600, color:"#F44336" },
  { level:8, name:"구구단 전설", emoji:"🐉", pts:850, color:"#FF5722" },
  { level:9, name:"구구단 신", emoji:"🏆", pts:1200, color:"#FFD700" },
];

let state = loadState();

function loadState() {
  try {
    const d = localStorage.getItem('gugudan_v3');
    return d ? JSON.parse(d) : { points:0, wrongList:[] };
  } catch { return { points:0, wrongList:[] }; }
}
function saveState() {
  try { localStorage.setItem('gugudan_v3', JSON.stringify(state)); } catch {}
}
function addPoints(n) { state.points += n; saveState(); }
function addWrong(p) {
  const k = p.a+'x'+p.b;
  if (!state.wrongList.find(w => w.a+'x'+w.b === k)) { state.wrongList.push(p); saveState(); }
}
function removeWrong(p) {
  const k = p.a+'x'+p.b;
  state.wrongList = state.wrongList.filter(w => w.a+'x'+w.b !== k);
  saveState();
}
function resetAll() { state = { points:0, wrongList:[] }; saveState(); renderHome(); }

function getLevelInfo(pts) {
  let cur = LEVELS[0];
  for (const l of LEVELS) if (pts >= l.pts) cur = l;
  const nxt = LEVELS.find(l => l.pts > pts) || null;
  return { cur, nxt };
}

function genProblems(dan, rand) {
  const arr = [];
  for (let i=1;i<=9;i++) arr.push({ a:dan, b:i, answer:dan*i });
  return rand ? shuffle(arr) : arr;
}
function genAll(rand) {
  const arr = [];
  for (let d=2;d<=9;d++) for (let i=1;i<=9;i++) arr.push({ a:d, b:i, answer:d*i });
  return rand ? shuffle(arr) : arr;
}
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

const $ = sel => document.querySelector(sel);
const app = () => $('#app');

// ═══════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════
let confettiAnim = null;
function fireConfetti() {
  const canvas = $('#confetti-canvas');
  canvas.classList.remove('hidden');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ["#FF6B6B","#FFE66D","#4ECDC4","#45B7D1","#96CEB4","#FF9FF3","#F8B500","#00D2FF"];
  const particles = [];
  for (let i=0;i<80;i++) {
    particles.push({
      x: canvas.width/2 + (Math.random()-0.5)*200, y: canvas.height/2,
      vx: (Math.random()-0.5)*15, vy: -Math.random()*18-5,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: Math.random()*6+3, life:1, gravity:0.3,
      shape: Math.random()>0.5?'c':'r',
      rot: Math.random()*Math.PI*2, rs: (Math.random()-0.5)*0.3
    });
  }
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p => {
      if(p.life<=0)return; alive=true;
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.life-=0.015; p.rot+=p.rs;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
      if(p.shape==='c'){ctx.beginPath();ctx.arc(0,0,p.size,0,Math.PI*2);ctx.fill();}
      else ctx.fillRect(-p.size,-p.size/2,p.size*2,p.size);
      ctx.restore();
    });
    if(alive) confettiAnim=requestAnimationFrame(draw);
    else { canvas.classList.add('hidden'); ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  draw();
}

// ═══════════════════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════════════════
function renderHome() {
  const li = getLevelInfo(state.points);
  const pct = li.nxt ? Math.min(100, ((state.points - li.cur.pts) / (li.nxt.pts - li.cur.pts))*100) : 100;
  const gradColor = li.nxt ? `linear-gradient(90deg,${li.cur.color},${li.nxt.color})` : li.cur.color;

  const modes = [
    { id:'danSelect', emoji:'📖', t:'단별 학습', d:'한 단씩 차근차근', c:'#667eea' },
    { id:'allLearn', emoji:'📚', t:'전체 학습', d:'2~9단 전부!', c:'#f093fb' },
    { id:'quiz', emoji:'⏱️', t:'전체 퀴즈', d:'7초 안에 O/X!', c:'#4ECDC4' },
    { id:'speed', emoji:'⚡', t:'스피드 챌린지', d:'60초 도전!', c:'#FF6B6B' },
    { id:'wrong', emoji:'🔄', t:'오답 복습', d:`${state.wrongList.length}개 오답`, c:'#FFB347' },
    { id:'levelMap', emoji:'🗺️', t:'레벨 맵', d:'나의 성장 기록', c:'#96CEB4' },
  ];

  app().innerHTML = `
    <div style="text-align:center;margin-bottom:24px;padding-top:10px">
      <div class="jua" style="font-size:44px;letter-spacing:-1px">✨ 구구단 마스터 ✨</div>
      <div style="font-size:15px;opacity:0.7;margin-top:4px">2단~9단 완전정복!</div>
    </div>
    <div class="level-badge">
      <div class="row">
        <span class="emoji">${li.cur.emoji}</span>
        <div>
          <div class="jua name">Lv.${li.cur.level} ${li.cur.name}</div>
          <div class="pts">총 ${state.points}pt</div>
        </div>
      </div>
      ${li.nxt ? `
      <div class="progress-label"><span>다음: ${li.nxt.emoji} ${li.nxt.name}</span><span>${state.points}/${li.nxt.pts}pt</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${gradColor}"></div></div>
      ` : '<div style="font-size:13px;opacity:0.7;text-align:center">🏆 최고 레벨 달성!</div>'}
    </div>
    ${modes.map((m,i) => {
      const dis = m.id==='wrong' && state.wrongList.length===0;
      return `<div class="mode-card ${dis?'disabled':''}" data-mode="${m.id}" style="background:linear-gradient(135deg,${m.c}22,${m.c}11);border:1px solid ${m.c}44;animation-delay:${i*0.06}s">
        <span class="icon">${m.emoji}</span>
        <div><div class="jua title">${m.t}</div><div class="desc">${m.d}</div></div>
      </div>`;
    }).join('')}
    <div class="reset-btn" id="resetBtn">데이터 초기화</div>
  `;

  document.querySelectorAll('.mode-card').forEach(el => {
    el.addEventListener('click', () => {
      const mode = el.dataset.mode;
      if (el.classList.contains('disabled')) return;
      if (mode==='danSelect') renderDanSelect();
      else if (mode==='allLearn') renderFlashcard('📚 전체 학습', genAll(false));
      else if (mode==='quiz') renderQuiz();
      else if (mode==='speed') renderSpeedStart();
      else if (mode==='wrong') renderWrong();
      else if (mode==='levelMap') renderLevelMap();
    });
  });
  $('#resetBtn').addEventListener('click', () => { if(confirm('정말 초기화할까요?')) resetAll(); });
}

// ═══════════════════════════════════════════════════════
// DAN SELECT
// ═══════════════════════════════════════════════════════
function renderDanSelect() {
  const colors = ["#667eea","#f093fb","#4ECDC4","#FF6B6B","#FFB347","#96CEB4","#45B7D1","#FF9FF3"];
  app().innerHTML = `
    <div class="back-btn" id="backBtn">← 홈으로</div>
    <div class="screen-title"><h2 class="jua">📖 몇 단을 배울까?</h2></div>
    <div class="dan-grid">
      ${[2,3,4,5,6,7,8,9].map((d,i) => `
        <div class="dan-cell" data-dan="${d}" style="background:linear-gradient(135deg,${colors[i]}33,${colors[i]}11);border:2px solid ${colors[i]}66">
          <div class="jua num">${d}단</div>
          <div class="range">${d}×1 ~ ${d}×9</div>
        </div>
      `).join('')}
    </div>
  `;
  $('#backBtn').addEventListener('click', renderHome);
  document.querySelectorAll('.dan-cell').forEach(el => {
    el.addEventListener('click', () => {
      const d = parseInt(el.dataset.dan);
      renderFlashcard(`📖 ${d}단 학습`, genProblems(d, false));
    });
  });
}

// ═══════════════════════════════════════════════════════
// FLASHCARD MODE (학습)
// ═══════════════════════════════════════════════════════
function renderFlashcard(title, initProblems) {
  let problems = [...initProblems];
  let idx = 0, flipped = false, isRandom = false;

  function render() {
    const p = problems[idx];
    app().innerHTML = `
      <div class="back-btn" id="backBtn">← 돌아가기</div>
      <div class="screen-title"><h2 class="jua">${title}</h2></div>
      <div class="toggle-row">
        <div class="toggle-btn ${!isRandom?'active':''}" id="togOrder">📋 순서대로</div>
        <div class="toggle-btn ${isRandom?'active':''}" id="togRandom">🔀 랜덤</div>
      </div>
      <div style="text-align:center;font-size:14px;opacity:0.6;margin-bottom:16px">${idx+1} / ${problems.length}</div>
      <div class="card-container" id="cardArea">
        <div class="card-inner ${flipped?'flipped':''}">
          <div class="card-face card-front">
            <div class="jua q">${p.a} × ${p.b}</div>
            <div class="hint">탭하면 정답 확인!</div>
          </div>
          <div class="card-face card-back">
            <div class="sub">${p.a} × ${p.b} =</div>
            <div class="jua ans">${p.answer}</div>
          </div>
        </div>
      </div>
      <div class="nav-row">
        <button class="nav-btn prev" id="prevBtn" ${idx<=0?'disabled':''}>◀ 이전</button>
        <button class="nav-btn next" id="nextBtn" ${idx>=problems.length-1?'disabled':''}>다음 ▶</button>
      </div>
    `;
    // Back
    const backTarget = title.includes('단 학습') ? renderDanSelect : renderHome;
    $('#backBtn').addEventListener('click', backTarget);
    // Toggle
    $('#togOrder').addEventListener('click', () => { if(isRandom){ isRandom=false; problems=[...initProblems]; idx=0; flipped=false; render(); }});
    $('#togRandom').addEventListener('click', () => { if(!isRandom){ isRandom=true; problems=shuffle([...initProblems]); idx=0; flipped=false; render(); }});
    // Flip
    $('#cardArea').addEventListener('click', () => { flipped=!flipped; render(); });
    // Nav
    $('#prevBtn').addEventListener('click', () => { if(idx>0){ idx--; flipped=false; render(); }});
    $('#nextBtn').addEventListener('click', () => { if(idx<problems.length-1){ idx++; flipped=false; render(); }});
  }
  render();
}

// ═══════════════════════════════════════════════════════
// QUIZ MODE (7초 타이머 + O/X)
// ═══════════════════════════════════════════════════════
function renderQuiz() {
  const problems = genAll(true).slice(0, 20);
  let idx=0, flipped=false, timer=7, streak=0, earnedPts=0, correctCnt=0, wrongCnt=0;
  let timerId = null, showStreakBanner = false;

  function startTimer() {
    clearInterval(timerId);
    timerId = setInterval(() => {
      timer--;
      if (timer <= 0) { clearInterval(timerId); flipped = true; }
      render();
    }, 1000);
  }

  function handleOX(isCorrect) {
    clearInterval(timerId);
    const p = problems[idx];
    if (isCorrect) {
      streak++;
      const pts = streak >= 3 ? 3 : 2;
      earnedPts += pts; addPoints(pts); correctCnt++;
      if (streak >= 3) { showStreakBanner = true; fireConfetti(); setTimeout(() => { showStreakBanner = false; renderCurrent(); }, 1500); }
    } else {
      streak = 0; wrongCnt++; addWrong(p);
    }
    setTimeout(() => {
      if (idx >= problems.length - 1) { renderQuizResult(); return; }
      idx++; flipped = false; timer = 7; showStreakBanner = false;
      render(); startTimer();
    }, 600);
  }

  function renderQuizResult() {
    clearInterval(timerId);
    const timeouts = problems.length - correctCnt - wrongCnt;
    app().innerHTML = `
      <div class="result-center">
        <div style="font-size:50px;margin-bottom:16px">🎉</div>
        <div class="jua" style="font-size:28px;margin-bottom:24px">퀴즈 완료!</div>
        <div class="result-box">
          <div class="line">⭕ 맞은 문제: <b>${correctCnt}</b>개</div>
          <div class="line">❌ 틀린 문제: <b>${wrongCnt}</b>개</div>
          <div class="line">⏱️ 시간초과: <b>${timeouts}</b>개</div>
          <div class="jua earned">+${earnedPts}pt 획득!</div>
        </div>
        <button class="home-btn" id="homeBtn">홈으로</button>
      </div>
    `;
    $('#homeBtn').addEventListener('click', renderHome);
  }

  function renderCurrent() { render(); }

  function render() {
    const p = problems[idx];
    const tc = timer<=2 ? '#FF4444' : timer<=4 ? '#FFB347' : '#4ECDC4';
    app().innerHTML = `
      <div class="back-btn" id="backBtn">← 돌아가기</div>
      <div class="screen-title"><h2 class="jua">⏱️ 전체 퀴즈</h2></div>
      <div class="info-bar"><span>${idx+1}/${problems.length}</span><span>🔥 ${streak}연속 | +${earnedPts}pt</span></div>
      <div class="timer-bar"><div class="timer-fill" style="width:${(timer/7)*100}%;background:${tc}"></div></div>
      <div class="jua timer-num" style="color:${tc}">${timer}초</div>
      ${showStreakBanner ? `<div class="jua streak-banner">🔥 ${streak}연속 정답! +3pt 🔥</div>` : ''}
      <div class="card-container" id="cardArea">
        <div class="card-inner ${flipped?'flipped':''}">
          <div class="card-face quiz-card-front">
            <div class="jua" style="font-size:42px;font-weight:800">${p.a} × ${p.b} = ?</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:10px">시간 안에 기억해봐!</div>
          </div>
          <div class="card-face quiz-card-back" style="transform:rotateY(180deg)">
            <div style="font-size:20px;color:rgba(255,255,255,0.8)">${p.a} × ${p.b} =</div>
            <div class="jua" style="font-size:56px;font-weight:800">${p.answer}</div>
          </div>
        </div>
      </div>
      ${!flipped ? `<button class="flip-btn" id="flipBtn">정답 확인</button>` : `
      <div class="ox-row">
        <button class="ox-btn o" id="oBtn">⭕ 맞았어</button>
        <button class="ox-btn x" id="xBtn">❌ 틀렸어</button>
      </div>`}
    `;
    $('#backBtn').addEventListener('click', () => { clearInterval(timerId); renderHome(); });
    if (!flipped) {
      $('#flipBtn').addEventListener('click', () => { clearInterval(timerId); flipped=true; render(); });
    } else {
      $('#oBtn').addEventListener('click', () => handleOX(true));
      $('#xBtn').addEventListener('click', () => handleOX(false));
    }
  }
  render(); startTimer();
}

// ═══════════════════════════════════════════════════════
// SPEED MODE (60초)
// ═══════════════════════════════════════════════════════
function renderSpeedStart() {
  app().innerHTML = `
    <div class="start-center">
      <div style="font-size:60px;margin-bottom:16px">⚡</div>
      <div class="jua" style="font-size:30px;margin-bottom:12px">스피드 챌린지</div>
      <div style="font-size:15px;opacity:0.7;margin-bottom:32px;text-align:center">60초 동안 최대한 많은 구구단을 풀어봐!<br>답을 입력하고 엔터!</div>
      <button class="jua start-btn" id="startBtn">시작!</button>
      <div style="margin-top:20px;cursor:pointer;opacity:0.5;font-size:14px" id="backBtn">← 홈으로</div>
    </div>
  `;
  $('#startBtn').addEventListener('click', runSpeed);
  $('#backBtn').addEventListener('click', renderHome);
}

function runSpeed() {
  const problems = genAll(true);
  let idx=0, timeLeft=60, streak=0, earnedPts=0, correctCnt=0, wrongCnt=0, feedback=null;
  let timerId = null;

  timerId = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) { clearInterval(timerId); renderSpeedResult(); return; }
    render();
  }, 1000);

  function handleSubmit() {
    const inp = $('#speedInput');
    if (!inp || !inp.value.trim()) return;
    const val = parseInt(inp.value);
    const p = problems[idx];
    if (val === p.answer) {
      streak++;
      const pts = streak >= 3 ? 3 : 2;
      earnedPts += pts; addPoints(pts); correctCnt++;
      feedback = 'correct';
      if (streak >= 3) fireConfetti();
    } else {
      streak = 0; wrongCnt++; addWrong(p);
      feedback = 'wrong';
    }
    setTimeout(() => { feedback = null; idx++; render(); focusInput(); }, 250);
  }

  function focusInput() { setTimeout(() => { const inp=$('#speedInput'); if(inp) inp.focus(); }, 50); }

  function renderSpeedResult() {
    app().innerHTML = `
      <div class="result-center">
        <div style="font-size:50px;margin-bottom:16px">🏁</div>
        <div class="jua" style="font-size:28px;margin-bottom:24px">타임 업!</div>
        <div class="result-box">
          <div class="line">✅ 맞은 문제: <b>${correctCnt}</b>개</div>
          <div class="line">❌ 틀린 문제: <b>${wrongCnt}</b>개</div>
          <div class="line">📊 총 시도: <b>${correctCnt+wrongCnt}</b>개</div>
          <div class="jua earned">+${earnedPts}pt 획득!</div>
        </div>
        <button class="home-btn" id="homeBtn">홈으로</button>
      </div>
    `;
    $('#homeBtn').addEventListener('click', renderHome);
  }

  function render() {
    const p = problems[idx];
    const tc = timeLeft<=10 ? '#FF4444' : timeLeft<=20 ? '#FFB347' : '#4ECDC4';
    const pct = (timeLeft/60)*100;
    const fb = feedback || 'neutral';
    app().innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="jua" style="font-size:28px;font-weight:900;color:${tc}">${timeLeft}초</span>
        <span style="font-size:14px;opacity:0.7">🔥${streak}연속 | ✅${correctCnt} | +${earnedPts}pt</span>
      </div>
      <div class="timer-bar" style="height:8px"><div class="timer-fill" style="width:${pct}%;background:${tc}"></div></div>
      <div style="height:16px"></div>
      <div class="speed-card ${fb}">
        <div class="jua" style="font-size:44px;font-weight:800;margin-bottom:20px">${p.a} × ${p.b} = ?</div>
        <input type="number" id="speedInput" class="jua speed-input" placeholder="답 입력" autocomplete="off" inputmode="numeric">
        <div><button class="speed-submit" id="submitBtn">확인 ↵</button></div>
      </div>
    `;
    $('#submitBtn').addEventListener('click', handleSubmit);
    $('#speedInput').addEventListener('keydown', e => { if(e.key==='Enter') handleSubmit(); });
    focusInput();
  }
  render();
}

// ═══════════════════════════════════════════════════════
// WRONG MODE
// ═══════════════════════════════════════════════════════
function renderWrong() {
  let idx = 0, flipped = false;

  function render() {
    if (state.wrongList.length === 0) {
      app().innerHTML = `
        <div class="result-center">
          <div style="font-size:50px;margin-bottom:16px">🎉</div>
          <div class="jua" style="font-size:24px;margin-bottom:12px">오답이 없어요!</div>
          <div style="font-size:14px;opacity:0.7;margin-bottom:24px">모든 문제를 다 맞혔어요!</div>
          <button class="home-btn" id="homeBtn">홈으로</button>
        </div>
      `;
      $('#homeBtn').addEventListener('click', renderHome);
      return;
    }
    const si = Math.min(idx, state.wrongList.length - 1);
    idx = si;
    const p = state.wrongList[si];

    app().innerHTML = `
      <div class="back-btn" id="backBtn">← 돌아가기</div>
      <div class="screen-title"><h2 class="jua">🔄 오답 복습</h2></div>
      <div style="text-align:center;font-size:14px;opacity:0.6;margin-bottom:20px">${si+1} / ${state.wrongList.length}개 오답</div>
      <div class="card-container" id="cardArea">
        <div class="card-inner ${flipped?'flipped':''}">
          <div class="card-face card-front">
            <div class="jua q">${p.a} × ${p.b}</div>
            <div class="hint">탭하면 정답 확인!</div>
          </div>
          <div class="card-face card-back">
            <div class="sub">${p.a} × ${p.b} =</div>
            <div class="jua ans">${p.answer}</div>
          </div>
        </div>
      </div>
      <div class="wrong-nav">
        <button class="wrong-btn side" id="prevBtn" ${si<=0?'disabled':''}>◀ 이전</button>
        <button class="wrong-btn got-it" id="gotBtn">✅ 이제 알겠어!</button>
        <button class="wrong-btn side" id="nextBtn" ${si>=state.wrongList.length-1?'disabled':''}>다음 ▶</button>
      </div>
    `;
    $('#backBtn').addEventListener('click', renderHome);
    $('#cardArea').addEventListener('click', () => { flipped=!flipped; render(); });
    $('#prevBtn').addEventListener('click', () => { if(idx>0){ idx--; flipped=false; render(); }});
    $('#nextBtn').addEventListener('click', () => { if(idx<state.wrongList.length-1){ idx++; flipped=false; render(); }});
    $('#gotBtn').addEventListener('click', () => {
      removeWrong(p);
      if (state.wrongList.length === 0) { render(); return; }
      if (idx >= state.wrongList.length) idx = Math.max(0, state.wrongList.length - 1);
      flipped = false; render();
    });
  }
  render();
}

// ═══════════════════════════════════════════════════════
// LEVEL MAP
// ═══════════════════════════════════════════════════════
function renderLevelMap() {
  const li = getLevelInfo(state.points);
  const reversed = [...LEVELS].reverse();

  app().innerHTML = `
    <div class="back-btn" id="backBtn">← 돌아가기</div>
    <div class="screen-title"><h2 class="jua">🗺️ 레벨 맵</h2></div>
    <div style="text-align:center;font-size:14px;opacity:0.7;margin-bottom:24px">총 ${state.points}pt</div>
    <div style="max-width:360px;margin:0 auto">
      ${reversed.map((lvl, i) => {
        const unlocked = state.points >= lvl.pts;
        const isCur = lvl.level === li.cur.level;
        const bg = isCur ? `linear-gradient(135deg,${lvl.color},${lvl.color}cc)`
          : unlocked ? `${lvl.color}33` : 'rgba(255,255,255,0.05)';
        const border = isCur ? `3px solid ${lvl.color}` : unlocked ? `2px solid ${lvl.color}66` : '2px solid rgba(255,255,255,0.1)';
        const shadow = isCur ? `0 0 20px ${lvl.color}55` : 'none';
        const connBg = unlocked ? `${lvl.color}88` : 'rgba(255,255,255,0.08)';
        return `
          <div class="level-node">
            ${i < LEVELS.length-1 ? `<div class="level-connector" style="background:${connBg}"></div>` : ''}
            <div class="level-circle" style="background:${bg};border:${border};box-shadow:${shadow}">
              ${unlocked ? lvl.emoji : '🔒'}
            </div>
            <div class="level-info" style="opacity:${unlocked?1:0.4}">
              <div class="jua lname" style="color:${isCur?lvl.color:'#fff'}">
                Lv.${lvl.level} ${lvl.name}
                ${isCur ? `<span class="current-tag" style="background:${lvl.color}">현재</span>` : ''}
              </div>
              <div class="lpts">${lvl.pts}pt 필요</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  $('#backBtn').addEventListener('click', renderHome);
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
renderHome();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
